{% extends "base.html" %}
{% block page_title %}Lista faktur{% endblock %}
{% block content %}
<div class="bg-white rounded-xl shadow-sm border p-5 mb-5">
    <div class="flex flex-wrap items-end gap-3">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Szukaj</label>
            <input type="text" id="filter-search" placeholder="Kontrahent, numer..."
                class="border rounded-lg px-3 py-2 text-sm w-48 focus:ring-2 focus:ring-ksef-500">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Typ</label>
            <select id="filter-type" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-ksef-500">
                <option value="">Wszystkie</option>
                <option value="sales">Sprzedaż</option>
                <option value="purchase">Zakup</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Status</label>
            <select id="filter-status" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-ksef-500">
                <option value="">Wszystkie</option>
                <option value="new">Nowe</option>
                <option value="accepted">Zaakceptowane</option>
                <option value="rejected">Odrzucone</option>
                <option value="flagged">Do sprawdzenia</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Od</label>
            <input type="date" id="filter-date-from" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-ksef-500">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Do</label>
            <input type="date" id="filter-date-to" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-ksef-500">
        </div>
        <button onclick="loadInvoices()" class="bg-ksef-600 hover:bg-ksef-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Filtruj</button>
        <button onclick="clearFilters()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition">Wyczyść</button>
    </div>
</div>

<div class="bg-white rounded-xl shadow-sm border">
    <div class="flex items-center justify-between px-5 py-3 border-b">
        <div class="flex items-center gap-3">
            <input type="checkbox" id="select-all" onchange="toggleSelectAll()" class="rounded border-gray-300 text-ksef-600">
            <span class="text-sm text-gray-500" id="invoices-count">-</span>
        </div>
        <div class="flex gap-2">
            <button onclick="printSelected()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition">Drukuj zaznaczone</button>
            <button onclick="exportCSV()" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition">Eksport CSV</button>
        </div>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                <tr>
                    <th class="p-3 w-8"></th>
                    <th class="p-3 text-left">Numer faktury</th>
                    <th class="p-3 text-left">Kontrahent</th>
                    <th class="p-3 text-left">Data</th>
                    <th class="p-3 text-right">Netto</th>
                    <th class="p-3 text-right">Brutto</th>
                    <th class="p-3 text-center">Typ</th>
                    <th class="p-3 text-center">Status</th>
                    <th class="p-3 text-center">Akcje</th>
                </tr>
            </thead>
            <tbody id="invoices-tbody">
                <tr><td colspan="9" class="text-center py-8 text-gray-400">Ładowanie...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allInvoices = [];

document.addEventListener('DOMContentLoaded', loadInvoices);
document.getElementById('filter-search').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') loadInvoices();
});

async function loadInvoices() {
    const params = new URLSearchParams();
    const search = document.getElementById('filter-search').value;
    const type = document.getElementById('filter-type').value;
    const status = document.getElementById('filter-status').value;
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo = document.getElementById('filter-date-to').value;

    if (search) params.set('search', search);
    if (type) params.set('type', type);
    if (status) params.set('status', status);
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);

    try {
        const resp = await fetch('/api/invoices?' + params.toString());
        allInvoices = await resp.json();
        renderInvoices(allInvoices);
    } catch(e) {
        showToast('Błąd ładowania faktur: ' + e.message, 'error');
    }
}

function renderInvoices(invoices) {
    const tbody = document.getElementById('invoices-tbody');
    document.getElementById('invoices-count').textContent = `${invoices.length} faktur`;

    if (!invoices.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8 text-gray-400">Brak faktur</td></tr>';
        return;
    }

    tbody.innerHTML = invoices.map(inv => {
        const statusColors = {
            'new': 'bg-blue-100 text-blue-700',
            'accepted': 'bg-green-100 text-green-700',
            'rejected': 'bg-red-100 text-red-700',
            'flagged': 'bg-yellow-100 text-yellow-700'
        };
        const statusLabels = { 'new': 'Nowa', 'accepted': 'OK', 'rejected': 'Odrzucona', 'flagged': 'Sprawdź' };
        const typeLabel = inv.invoice_type === 'sales' ? 'Sprzedaż' : 'Zakup';
        const typeColor = inv.invoice_type === 'sales' ? 'text-green-600' : 'text-red-600';
        const contractor = inv.invoice_type === 'sales' ? inv.buyer_name : inv.seller_name;

        return `<tr class="border-b hover:bg-gray-50 transition">
            <td class="p-3"><input type="checkbox" class="inv-checkbox rounded border-gray-300 text-ksef-600" value="${inv.id}"></td>
            <td class="p-3">
                <a href="/invoices/${inv.id}" class="text-ksef-600 hover:underline font-medium">${inv.invoice_number || inv.ksef_number}</a>
                <p class="text-xs text-gray-400">${inv.ksef_number}</p>
            </td>
            <td class="p-3">${contractor || '-'}</td>
            <td class="p-3 text-gray-500">${inv.issue_date || '-'}</td>
            <td class="p-3 text-right font-medium">${formatMoney(inv.net_amount)}</td>
            <td class="p-3 text-right font-bold">${formatMoney(inv.gross_amount)}</td>
            <td class="p-3 text-center"><span class="${typeColor} text-xs font-medium">${typeLabel}</span></td>
            <td class="p-3 text-center"><span class="px-2 py-1 rounded-full text-xs font-medium ${statusColors[inv.status] || ''}">${statusLabels[inv.status] || inv.status}</span></td>
            <td class="p-3 text-center">
                <div class="flex justify-center gap-1">
                    <button onclick="setStatus(${inv.id},'accepted')" class="p-1 hover:bg-green-100 rounded" title="Akceptuj">
                        <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    </button>
                    <button onclick="setStatus(${inv.id},'rejected')" class="p-1 hover:bg-red-100 rounded" title="Odrzuć">
                        <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                    <button onclick="printOne(${inv.id})" class="p-1 hover:bg-blue-100 rounded" title="Drukuj">
                        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function clearFilters() {
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-type').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-date-from').value = '';
    document.getElementById('filter-date-to').value = '';
    loadInvoices();
}

function toggleSelectAll() {
    const checked = document.getElementById('select-all').checked;
    document.querySelectorAll('.inv-checkbox').forEach(cb => cb.checked = checked);
}

function getSelectedIds() {
    return Array.from(document.querySelectorAll('.inv-checkbox:checked')).map(cb => parseInt(cb.value));
}

async function setStatus(id, status) {
    await fetch(`/api/invoices/${id}/status`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({status})
    });
    loadInvoices();
}

async function printSelected() {
    const ids = getSelectedIds();
    if (!ids.length) { showToast('Zaznacz faktury do wydruku', 'warning'); return; }
    const resp = await fetch('/api/print', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({invoice_ids: ids})
    });
    const data = await resp.json();
    showToast(data.message, data.ok ? 'success' : 'error');
}

async function printOne(id) {
    const resp = await fetch('/api/print', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({invoice_ids: [id]})
    });
    const data = await resp.json();
    showToast(data.message, data.ok ? 'success' : 'error');
}

function exportCSV() {
    const params = new URLSearchParams();
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo = document.getElementById('filter-date-to').value;
    const type = document.getElementById('filter-type').value;
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);
    if (type) params.set('type', type);
    window.location.href = '/api/stats/export?' + params.toString();
}
</script>
{% endblock %}
